{% extends "base.html" %}
{% block title %}Sign In — RoachFlix{% endblock %}
{% block content %}
<div class="min-h-[80vh] flex items-center justify-center">
  <div class="w-full max-w-sm">
    <h1 class="text-3xl font-bold text-center mb-2">Roach<span class="text-red-500">Flix</span></h1>
    <p class="text-white/40 text-center text-sm mb-8">Family movie & TV tracker</p>

    <form method="post" class="bg-card rounded-2xl p-6 space-y-4">
      {% with messages = get_flashed_messages() %}
        {% if messages %}
          <div class="text-red-400 text-sm text-center">{{ messages[0] }}</div>
        {% endif %}
      {% endwith %}
      <div>
        <label class="block text-xs text-white/50 mb-1 uppercase tracking-wider">Who are you?</label>
        <select name="username"
          class="w-full bg-[#2c2c2e] border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-red-500 text-base appearance-none">
          <option value="">Select family member…</option>
          <option>Homie</option>
          <option>Gillian</option>
          <option>Loren</option>
          <option>Blythe</option>
        </select>
      </div>
      <div>
        <label class="block text-xs text-white/50 mb-1 uppercase tracking-wider">Password</label>
        <input type="password" name="password" autocomplete="current-password"
          class="w-full bg-[#2c2c2e] border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-red-500 text-base"/>
      </div>
      <button type="submit"
        class="w-full bg-red-600 hover:bg-red-500 transition rounded-xl py-3 text-white font-semibold text-base">
        Sign In
      </button>
    </form>
  </div>
</div>
{% endblock %}
